<!DOCTYPE html>
<html>
<head>
    <title>Task 3 - Message App</title>
    <link rel="stylesheet" href="task3.css">
</head>
<body>

    <h1>Message App</h1>

    <p>Welcome! Add your messages below.</p>

    <input type="text" id="input" placeholder="Enter Message">

    <p id="count">Character Count : 0</p>

    <button id="btn">Add Message</button>

    <button id="clear">Clear All Messages</button>

    <button id="expired">Show Expired Messages</button>

    <p id="status"></p>

    <p id="total">Total Messages : 0</p>

    <h2>Messages</h2>

    <div id="result"></div>

    <script src="task3.js"></script>

</body>
</html>
